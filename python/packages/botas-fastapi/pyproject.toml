[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "botas-fastapi"
version = "0.1.0"
description = "FastAPI integration for botas – zero-boilerplate Bot Framework bot hosting"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = [
    "botas>=0.1.0",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "ruff>=0.11",
]

[tool.hatch.build.targets.wheel]
packages = ["src/botas_fastapi"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
