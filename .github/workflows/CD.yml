name: CD

on:
  push:
    branches: [main, release/**]
    tags: ['v*']

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.release.outputs.is_release }}
      dotnet: ${{ steps.release.outputs.is_release == 'true' || steps.filter.outputs.dotnet }}
      node: ${{ steps.release.outputs.is_release == 'true' || steps.filter.outputs.node }}
      python: ${{ steps.release.outputs.is_release == 'true' || steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check if release
        id: release
        run: |
          if [[ "${{ github.ref }}" == refs/heads/release/* ]] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        if: steps.release.outputs.is_release != 'true'
        id: filter
        with:
          filters: |
            dotnet:
              - 'dotnet/**'
              - 'version.json'
            node:
              - 'node/**'
              - 'version.json'
            python:
              - 'python/**'
              - 'version.json'

  dotnet:
    needs: changes
    if: needs.changes.outputs.dotnet == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Botas.slnx

      - name: Build
        run: dotnet build Botas.slnx --no-restore -c Release

      - name: Test
        run: dotnet test Botas.slnx --no-build -c Release

      - name: Pack
        run: dotnet pack src/Botas/Botas.csproj --no-build -c Release -o ./nupkg

      - name: Publish to NuGet
        if: needs.changes.outputs.is_release == 'true'
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish to GitHub Packages
        if: needs.changes.outputs.is_release != 'true'
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/rido-min/index.json --skip-duplicate

  node:
    needs: changes
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js (public npm)
        if: needs.changes.outputs.is_release == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: node/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Node.js (GitHub Packages)
        if: needs.changes.outputs.is_release != 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: node/package-lock.json
          registry-url: 'https://npm.pkg.github.com'
          scope: '@rido-min'

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        run: npx nbgv-setversion
        working-directory: node/packages/botas-core

      - name: Set botas-express package version
        run: npx nbgv-setversion
        working-directory: node/packages/botas-express

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --workspaces --if-present

      - name: Publish to npm
        if: needs.changes.outputs.is_release == 'true'
        run: npm publish --workspace packages/botas-core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish botas-express to npm
        if: needs.changes.outputs.is_release == 'true'
        run: npm publish --workspace packages/botas-express --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        if: needs.changes.outputs.is_release != 'true'
        run: npm publish --workspace packages/botas-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish botas-express to GitHub Packages
        if: needs.changes.outputs.is_release != 'true'
        run: npm publish --workspace packages/botas-express
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      actions: read
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: python/packages/botas
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install nbgv CLI
        run: dotnet tool install --global nbgv

      - name: Install build tools
        run: pip install build

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .
        working-directory: python

      - name: Test
        run: python -m pytest tests/ -v

      - name: Set package version
        run: |
          VERSION=$(nbgv get-version -v SimpleVersion)
          HEIGHT=$(nbgv get-version -v VersionHeight)
          if [[ "${{ needs.changes.outputs.is_release }}" == "true" ]]; then
            echo "__version__ = \"${VERSION}\"" > src/botas/_version.py
          else
            echo "__version__ = \"${VERSION}.dev${HEIGHT}\"" > src/botas/_version.py
          fi
          cat src/botas/_version.py

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        if: needs.changes.outputs.is_release == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: python/packages/botas/dist/

      - name: Publish to TestPyPI
        if: needs.changes.outputs.is_release != 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          packages-dir: python/packages/botas/dist/

  release:
    if: always() && needs.changes.outputs.is_release == 'true' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    needs: [changes, dotnet, node, python]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Install nbgv
        run: dotnet tool install --global nbgv

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(nbgv get-version -v SimpleVersion)
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > release-body.md
          ## Published Packages

          | Language | Package | Registry |
          |----------|---------|----------|
          | .NET | `Botas` | [nuget.org/packages/Botas](https://www.nuget.org/packages/Botas) |
          | Node.js | `botas-core` | [npmjs.com/package/botas-core](https://www.npmjs.com/package/botas-core) |
          | Node.js | `botas-express` | [npmjs.com/package/botas-express](https://www.npmjs.com/package/botas-express) |
          | Python | `botas` | [pypi.org/project/botas](https://pypi.org/project/botas) |
          EOF

          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release-body.md \
            --generate-notes
