name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dotnet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore Botas.slnx

      - name: Build
        run: dotnet build Botas.slnx --no-restore

      - name: Test
        run: dotnet test Botas.slnx --no-build

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        run: npx nbgv-setversion
        working-directory: node/packages/botas

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --workspaces --if-present

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python/packages/botas
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install nbgv CLI
        run: dotnet tool install --global nbgv

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .
        working-directory: python

      - name: Test
        run: python -m pytest tests/ -v
